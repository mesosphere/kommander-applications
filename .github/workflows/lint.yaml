name: Lint

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled

permissions:
  contents: read

# https://stackoverflow.com/a/72408109/3058839
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: self-hosted-nutanix-small

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install NIX
        uses: cachix/install-nix-action@v31

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.13.0
        with:
          skip-nix-installation: true
          enable-cache: 'false'
          refresh-cli: 'true'

      - name: Run pre-commit
        run: devbox run -- make pre-commit
