name: Tests
on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

# https://stackoverflow.com/a/72408109/3058839
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go Test
    runs-on: self-hosted-nutanix-docker-xsmall
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install NIX
        uses: cachix/install-nix-action@v31

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.13.0
        with:
          skip-nix-installation: true
          enable-cache: 'false'
          refresh-cli: 'true'

      - name: Run unit tests
        run: devbox run -- make go-test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check if git-operator manifests are up to date
        run: |
          devbox run just git-operator-fetch-manifests
          git diff --exit-code

      - name: Check if kommander application server works
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global  user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          devbox run -- just test-server

      - name: Report Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: hack/release/coverage.out
