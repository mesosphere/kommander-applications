name: Check licenses.d2iq.yaml

permissions:
  contents: write

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
  workflow_dispatch: {}
  push:
    tags:
      - v*
    branches:
      - main

# https://stackoverflow.com/a/72408109/3058839
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-license-yaml:
    runs-on: self-hosted-nutanix-docker-large
    name: Check licenses.d2iq.yaml
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install NIX
        uses: cachix/install-nix-action@v31

      - name: Install devbox
        uses: jetify-com/devbox-install-action@v0.13.0
        with:
          skip-nix-installation: true
          enable-cache: "false"
          refresh-cli: "true"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Import GPG key
        if: |
          contains(github.event.pull_request.labels.*.name, 'update-licenses')
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true

      - name: Set git config
        if: |
          contains(github.event.pull_request.labels.*.name, 'update-licenses')
        run: |
          git config user.email ci-mergebot@d2iq.com
          git config user.name d2iq-mergebot
          git config --global user.signingkey ${{ secrets.MERGEBOT_GPG_KEY_ID }}
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git config --global url."https://oauth2:${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          GITHUB_TOKEN: ${{ secrets.MESOSPHERECI_USER_TOKEN }}

      - name: Validate artifacts_full.yaml is up to date
        if: |
          ${{ !contains(github.event.pull_request.labels.*.name, 'update-licenses') }}
        run: devbox run make validate-artifacts-yaml-in-sync

      - name: Update artifacts_full.yaml
        if: |
          contains(github.event.pull_request.labels.*.name, 'update-licenses')
        run: |
          devbox run make generate-artifacts-yaml
          git add artifacts_full.yaml
          if output=$(git status --porcelain) && [ ! -z "$output" ]; then
            git commit -S -v -m "build: Updated artifacts_full.yaml"
            git push --force-with-lease
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MESOSPHERECI_USER_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: List airgapped images
        run: devbox run make list-airgapped-artifacts-yaml

      - name: Update licenses
        id: updateLicenses
        continue-on-error: true
        if: |
          contains(github.event.pull_request.labels.*.name, 'update-licenses')
        uses: docker://mesosphere/dkp-licenses-cli:licenses-v0.0.14
        with:
          args: >-
            validate container-images-mapping --input=artifacts_airgapped_images.txt --mapping-file=licenses.d2iq.yaml
            --check-sources --check-sources-skip-gh-org mesosphere --update-licenses
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Commit and push changes
        if: |
          contains(github.event.pull_request.labels.*.name, 'update-licenses')
        run: |
          git add licenses.d2iq.yaml
          if output=$(git status --porcelain) && [ ! -z "$output" ]; then
            git commit -S -v -m "build: Updated licenses.d2iq.yaml"
            git push --force-with-lease
            gh pr close "$PR_URL"
            gh pr reopen "$PR_URL"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.MESOSPHERECI_USER_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
      - name: Run validation
        run: |
          docker run --rm \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -v "$PWD:/workspace" -w /workspace \
            mesosphere/dkp-licenses-cli:licenses-v0.0.14 \
            validate container-images-mapping \
              --input=artifacts_airgapped_images.txt \
              --mapping-file=licenses.d2iq.yaml \
              --check-sources \
              --check-sources-skip-gh-org mesosphere \
              --output-format=github
