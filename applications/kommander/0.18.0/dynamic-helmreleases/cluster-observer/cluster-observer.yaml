---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${releaseName}
  namespace: ${namespace}
  labels:
    kommander.mesosphere.io/cluster-id: ${clusterID}
  annotations:
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  chart:
    spec:
      chart: ./applications/kommander/charts/cluster-observer/cluster-observer-1.6.0.tgz
      sourceRef:
        kind: GitRepository
        name: management
        namespace: kommander-flux
  interval: 15s
  install:
    serverSideApply: true
    crds: CreateReplace
    remediation:
      retries: 30
  upgrade:
    serverSideApply: enabled
    crds: CreateReplace
    remediation:
      retries: 30
  rollback:
    serverSideApply: enabled
  releaseName: ${releaseName}
  valuesFrom:
    - kind: ConfigMap
      name: ${valuesFrom}
      optional: true
  targetNamespace: ${targetNamespace}
