apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: ${releaseName}-${appVersion}-chart
  namespace: ${releaseNamespace}
spec:
  interval: 1m
  # TODO: replace the URL and tag with the released version
  url: "oci://pullthrough.infra.nkp.sh/mesosphere/nkp-mcp-server"
  ref:
    tag: 0.0.0-dev.0
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nkp-mcp-server
  namespace: ${releaseNamespace}
spec:
  chartRef:
    kind: OCIRepository
    name: ${releaseName}-${appVersion}-chart
    namespace: ${releaseNamespace}
  interval: 15s
  releaseName: nkp-mcp-server
  targetNamespace: ${releaseNamespace}
  install:
    serverSideApply: true
    remediation:
      retries: 30
  upgrade:
    serverSideApply: enabled
    remediation:
      retries: 30
  rollback:
    serverSideApply: enabled
  valuesFrom:
    - kind: ConfigMap
      name: ${releaseName}-${appVersion}-config-defaults
