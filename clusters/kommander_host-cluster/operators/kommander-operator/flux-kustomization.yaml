apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kommander-operator
  namespace: kommander
spec:
  interval: 6h
  prune: true
  wait: true
  retryInterval: 1m
  timeout: 1m
  path: ./common/kommander-operator
  sourceRef:
    kind: GitRepository
    name: management
    namespace: kommander-flux
  postBuild:
    substitute:
      releaseNamespace: kommander
