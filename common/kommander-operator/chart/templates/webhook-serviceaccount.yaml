{{- if .Values.webhook.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: {{ include "kommander-operator.appName" . }}
    app.kubernetes.io/component: webhook
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  name: {{ include "kommander-operator.webhookName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
