# Default values for kommander-operator

replicaCount: 1
kommanderoperator:
  image:
    repository: mesosphere/kommander2-core-installer
    tag:
    pullPolicy: IfNotPresent

webhook:
  enabled: true
  replicaCount: 1
  port: 8443
  certIssuer:
    kind: ClusterIssuer
    name: kommander-ca

kubetools:
  image:
    repository: mesosphere/kommander2-kubetools
    tag:

priorityClassName: "dkp-critical-priority"
