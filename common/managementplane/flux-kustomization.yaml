apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: management-plane-operator
  namespace: "kommander"
  annotations:
    managementplane.nkp.nutanix.com/version: "${kommanderChartVersion:=v2.18.0-dev.23}"
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: management
    namespace: kommander-flux
  path: ./common/managementplane/manifests
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: kommander-vars
  prune: true
  wait: true
