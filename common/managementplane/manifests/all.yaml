apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: nkp-management-plane
    control-plane: nkp-management-plane-controller-manager
  name: nkp-management-plane-controller-manager
  namespace: kommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: controller-manager
      app.kubernetes.io/name: nkp-management-plane
      control-plane: nkp-management-plane-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/name: nkp-management-plane
        control-plane: nkp-management-plane-controller-manager
        kommander.mesosphere.io/flux-source-controller-ingress-access: "true"
    spec:
      containers:
      - args:
        - --metrics-address=0.0.0.0
        - --metrics-port=8080
        command:
        - /managementplane
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-dev.26}
        imagePullPolicy: IfNotPresent
        name: controller-manager
        ports:
        - containerPort: 8080
          name: metrics
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        runAsUser: 65532
      serviceAccountName: nkp-management-plane-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - emptyDir: {}
        name: tmp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: nkp-management-plane
    control-plane: nkp-management-plane-webhook
  name: nkp-management-plane-webhook
  namespace: kommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: webhook
      app.kubernetes.io/name: nkp-management-plane
      control-plane: nkp-management-plane-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webhook
        app.kubernetes.io/name: nkp-management-plane
        control-plane: nkp-management-plane-webhook
    spec:
      containers:
      - args:
        - --tls-cert-dir=/certs/
        command:
        - /managementplane-webhook
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-dev.26}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
        name: webhook
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8443
            scheme: HTTPS
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /certs
          name: cert
          readOnly: true
      securityContext:
        runAsUser: 65532
      serviceAccountName: nkp-management-plane-webhook
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: nkp-management-plane-webhook-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: nkp-management-plane
    control-plane: nkp-management-plane-webhook
  name: nkp-management-plane-webhook-tls
  namespace: kommander
spec:
  commonName: nkp-management-plane-webhook.kommander.svc
  dnsNames:
  - nkp-management-plane-webhook.kommander.svc
  - nkp-management-plane-webhook.kommander.svc.cluster.local
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-issuer
  secretName: nkp-management-plane-webhook-tls
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kommander/nkp-management-plane-webhook-tls
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: nkp-management-plane
    control-plane: nkp-management-plane-webhook
  name: nkp-management-plane-validating
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: nkp-management-plane-webhook
      namespace: kommander
      path: /validations
  failurePolicy: Ignore
  name: webhook.managementplane.nkp.nutanix.com
  rules:
  - apiGroups:
    - managementplane.nkp.nutanix.com
    apiVersions:
    - v1alpha1
    operations:
    - UPDATE
    resources:
    - managementplanes
  sideEffects: None
