apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: nkp-cluster
    control-plane: nkp-cluster-controller-manager
  name: nkp-cluster-controller-manager
  namespace: kommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: controller-manager
      app.kubernetes.io/name: nkp-cluster
      control-plane: nkp-cluster-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/name: nkp-cluster
        control-plane: nkp-cluster-controller-manager
    spec:
      containers:
      - args:
        - --enable-leader-election
        - --bootstrap-mode=false
        command:
        - /nkpcluster
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-dev}
        imagePullPolicy: IfNotPresent
        name: controller-manager
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      - args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --ignore-paths=/metrics
        - --v=10
        image: quay.io/brancz/kube-rbac-proxy:v0.19.1
        imagePullPolicy: IfNotPresent
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: metrics
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      securityContext:
        runAsUser: 65532
      serviceAccountName: nkp-cluster-controller-manager
      terminationGracePeriodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: nkp-cluster
    control-plane: nkp-cluster-webhook
  name: nkp-cluster-webhook
  namespace: kommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: webhook
      app.kubernetes.io/name: nkp-cluster
      control-plane: nkp-cluster-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webhook
        app.kubernetes.io/name: nkp-cluster
        control-plane: nkp-cluster-webhook
    spec:
      containers:
      - args:
        - --tls-cert-dir=/certs/
        command:
        - /nkpcluster-webhook
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-dev}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
        name: webhook
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8443
            scheme: HTTPS
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /certs
          name: cert
          readOnly: true
      securityContext:
        runAsUser: 65532
      serviceAccountName: nkp-cluster-webhook
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: nkp-cluster-webhook-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/component: webhook
    app.kubernetes.io/name: nkp-cluster
    control-plane: nkp-cluster-webhook
  name: nkp-cluster-webhook-tls
  namespace: kommander
spec:
  commonName: nkp-cluster-webhook
  dnsNames:
  - nkp-cluster-webhook.${releaseNamespace:-kommander}.svc
  - nkp-cluster-webhook.${releaseNamespace:-kommander}.svc.cluster.local
  issuerRef:
    kind: ClusterIssuer
    name: selfsigned-issuer
  secretName: nkp-cluster-webhook-tls
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: kommander/nkp-cluster-webhook-tls
  labels:
