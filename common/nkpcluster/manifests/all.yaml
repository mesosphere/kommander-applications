                          are allocated.
                        properties:
                          cidrBlocks:
                            description: cidrBlocks is a list of CIDR blocks.
                            items:
                              maxLength: 43
                              minLength: 1
                              type: string
                            maxItems: 100
                            type: array
                        required:
                        - cidrBlocks
                        type: object
                      serviceDomain:
                        description: serviceDomain is the domain name for services.
                        maxLength: 253
                        minLength: 1
                        type: string
                      services:
                        description: services is the network ranges from which service
                          VIPs are allocated.
                        properties:
                          cidrBlocks:
                            description: cidrBlocks is a list of CIDR blocks.
                            items:
                              maxLength: 43
