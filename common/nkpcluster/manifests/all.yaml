    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          NKPCluster orchestrates the lifecycle and upgrades of individual clusters (both management
          and workload clusters) by coordinating platform application upgrades and Kubernetes version
          upgrades.

          NKPCluster acts as a declarative API that manages the desired state of:
            - Platform applications (via KommanderCluster reference)
            - Kubernetes version (via CAPI Cluster reference)

          For management clusters, NKPCluster also manages the desired state of KommanderCore and
          enforces extra upgrade steps: KommanderCore is upgraded first, then platform applications,
          then Kubernetes version.

          The controller enforces a strict upgrade order:
           1. KommanderCore upgrade (management cluster only)
           2. Platform version upgrade (KommanderCluster platform applications)
           3. Kubernetes version upgrade (CAPI Cluster topology)

          This ensures platform components are compatible with the target Kubernetes
          version before the cluster upgrade begins.

          NKPCluster references two underlying cluster resources:
            - CAPIClusterRef: References the CAPI Cluster that manages
              the Kubernetes cluster infrastructure
            - KommanderClusterRef: References the KommanderCluster
              that manages platform applications and Kommander components
