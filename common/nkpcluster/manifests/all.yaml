  selector:
    matchLabels:
      app.kubernetes.io/component: controller-manager
      app.kubernetes.io/name: nkp-cluster
      control-plane: nkp-cluster-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/name: nkp-cluster
        control-plane: nkp-cluster-controller-manager
    spec:
      containers:
      - args:
        - --enable-leader-election
        image: mesosphere/kommander2-nkpcluster-controller:${kommanderChartVersion:=v2.18.0-dev}
        imagePullPolicy: IfNotPresent
        name: controller-manager
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      - args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --ignore-paths=/metrics
        - --v=10
        image: quay.io/brancz/kube-rbac-proxy:v0.19.1
        imagePullPolicy: IfNotPresent
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: metrics
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      securityContext:
        runAsUser: 65532
      serviceAccountName: nkp-cluster-controller-manager
      terminationGracePeriodSeconds: 10
