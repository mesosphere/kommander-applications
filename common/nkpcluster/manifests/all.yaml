                    type: object
                  topology:
                    description: |-
                      Topology is the CAPI Cluster topology specification. This field accepts the entire
                      topology object from a CAPI Cluster, allowing you to pass through the complete
                      topology configuration without having to define all its fields in NKPCluster.
                      The topology will be applied to the referenced CAPI Cluster.

                      Example usage:
                        import (
                          capiv1beta1 "sigs.k8s.io/cluster-api/api/v1beta1"
                          "k8s.io/apimachinery/pkg/runtime"
                        )

                        // To set topology from a CAPI Cluster:
                        topologyJSON, _ := json.Marshal(capiCluster.Spec.Topology)
                        nkpCluster.Spec.CAPICluster.Topology = &apiextensionsv1.JSON{Raw: topologyJSON}

                        // To unmarshal topology back to CAPI Cluster:
                        var topology capiv1beta1.Topology
                        json.Unmarshal(nkpCluster.Spec.CAPICluster.Topology.Raw, &topology)
                    x-kubernetes-preserve-unknown-fields: true
