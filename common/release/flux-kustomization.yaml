apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: release-operator
  namespace: "kommander"
  annotations:
    managementplane.nkp.nutanix.com/version: "${kommanderChartVersion:=v2.18.0-dev.19}"
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: management
    namespace: kommander-flux
  path: ./common/release/manifests
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: kommander-vars
  prune: true
  wait: true
  patches:
    - patch: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: release-controller-manager
        spec:
          template:
            spec:
              containers:
                - name: controller-manager
                  args:
                    - "--release-metadata-namespace=kommander"
      target:
        kind: Deployment
        name: release-controller-manager
