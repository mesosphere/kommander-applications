apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: release
    control-plane: release-controller-manager-metrics
    servicemonitor.kommander.mesosphere.io/path: metrics
  name: release-controller-manager-metrics
  namespace: kommander
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: release
    control-plane: release-controller-manager-metrics
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: controller-manager
    app.kubernetes.io/name: release
    control-plane: release-controller-manager
  name: release-controller-manager
  namespace: kommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: controller-manager
      app.kubernetes.io/name: release
      control-plane: release-controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/component: controller-manager
        app.kubernetes.io/name: release
        control-plane: release-controller-manager
    spec:
      containers:
      - command:
        - /release-operator
        env:
        - name: RELEASE_METADATA_OCI_URL
          valueFrom:
            configMapKeyRef:
              key: releaseMetadataOCIURL
              name: release-operator-vars
              optional: true
        - name: RELEASE_METADATA_OCI_TAG
          valueFrom:
            configMapKeyRef:
              key: releaseMetadataOCITag
              name: release-operator-vars
              optional: true
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-vanguard.15}
        imagePullPolicy: IfNotPresent
        name: controller-manager
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
      - args:
        - --secure-listen-address=0.0.0.0:8443
        - --upstream=http://127.0.0.1:8080/
        - --logtostderr=true
        - --ignore-paths=/metrics
        - --v=10
        image: quay.io/brancz/kube-rbac-proxy:v0.21.1
        imagePullPolicy: IfNotPresent
        name: kube-rbac-proxy
        ports:
        - containerPort: 8443
          name: https
        - containerPort: 8080
          name: metrics
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
      serviceAccountName: release-controller-manager
      terminationGracePeriodSeconds: 10
