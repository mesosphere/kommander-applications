apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: upgradeplan-operator
  namespace: kommander
  annotations:
    managementplane.nkp.nutanix.com/version: "${kommanderChartVersion:=v2.18.0-dev}"
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: management
    namespace: kommander-flux
  path: ./common/upgradeplan/manifests
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: substitution-vars
      - kind: ConfigMap
        name: kommander-vars
  prune: true
