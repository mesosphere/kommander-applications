      control-plane: upgradeplan-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webhook
        app.kubernetes.io/name: upgradeplan
        control-plane: upgradeplan-webhook
    spec:
      containers:
      - args:
        - --tls-cert-dir=/certs/
        command:
        - /upgradeplan-webhook
        image: mesosphere/kommander2-core-installer:${kommanderChartVersion:=v2.18.0-vanguard.16}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
            scheme: HTTPS
        name: webhook
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8443
            scheme: HTTPS
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - mountPath: /certs
          name: cert
          readOnly: true
      securityContext:
        runAsUser: 65532
      serviceAccountName: upgradeplan-webhook
      terminationGracePeriodSeconds: 10
      volumes:
      - name: cert
        secret:
          defaultMode: 420
          secretName: upgradeplan-webhook-tls
