      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          UpgradePlan defines a plan to upgrade a cluster. If the referenced cluster being upgraded is the
          management cluster, the management plane is upgraded first and then the NKPCluster.
          For all other clusters, only the NKPCluster is upgraded.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: UpgradePlanSpec defines the desired state of UpgradePlan.
            properties:
              controlPlaneImage:
                description: ControlPlaneImage is the name of OS image to use for
                  control plane machines
                type: string
              inputs:
                description: Inputs are unstructured fields used to update the referenced
                  NKPCluster spec.
                x-kubernetes-preserve-unknown-fields: true
              kubernetesVersion:
                description: KubernetesVersion is the target Kubernetes version for
                  the CAPI cluster upgrade.
                type: string
              nkpClusterRef:
                description: NKPClusterRef is a reference to the NKPCluster to upgrade.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              version:
                description: |-
                  Version is the NKP platform version to upgrade the ManagementPlane (if management cluster)
                  and NKPCluster to.
                type: string
                x-kubernetes-validations:
                - message: must be a non-empty valid semantic version (e.g. v1.2.3,
                    1.2.3-beta+build)
                  rule: size(self) > 0 && self.matches('^v?(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-[0-9A-Za-z-.]+)?(?:\\+[0-9A-Za-z-.]+)?$')
              workerVMImages:
                additionalProperties:
                  type: string
                description: WorkerVMImages are the names of OS images to use for
                  worker pools.
                type: object
            required:
            - nkpClusterRef
            - version
            type: object
          status:
            description: UpgradePlanStatus defines the observed state of UpgradePlan.
            properties:
              conditions:
                description: Conditions represents the current state of the UpgradePlan.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              managementPlane:
                description: ManagementPlane is the ManagementPlane YAML that was
                  applied during upgrade execution (management cluster only).
                type: string
              nkpCluster:
                description: NKPCluster is the NKPCluster YAML that was applied during
                  upgrade execution.
                type: string
              phase:
                description: Phase is the current phase of the upgrade.
                enum:
                - ValidatingInputs
                - UpgradingManagementPlane
                - UpgradingKommander
                - UpgradingPlatformApplications
                - UpgradingKubernetes
                - Upgraded
                type: string
              steps:
                description: |-
                  Steps is the ordered list of upgrade steps and their execution state.
                  The list is treated as atomic: the entire list is replaced on every write.
                items:
                  description: UpgradeStep represents a single named step in the upgrade
                    process.
                  properties:
                    description:
                      description: |-
                        Description is a human-readable explanation of what this step does.
                        Immutable after initialization.
                      type: string
                    endTime:
                      description: EndTime is when the step finished executing.
                      format: date-time
                      type: string
                    name:
                      description: |-
                        Name is the machine-readable identifier that uniquely identifies the step within the plan.
                        Immutable after initialization.
                      type: string
                    problem:
                      description: |-
                        Error is an optional non-terminal message describing a transient error or warning
                        encountered during the step. It does not affect the step state and can be cleared
                        by setting it to an empty string.
                      type: string
                    startTime:
                      description: StartTime is when the step began executing.
                      format: date-time
                      type: string
                    state:
                      allOf:
                      - enum:
                        - NotStarted
                        - Progressing
                        - Completed
                      - enum:
                        - NotStarted
                        - Progressing
                        - Completed
                      description: State is the current execution state of the step.
                      type: string
                    title:
                      description: |-
                        Title is the human-readable label for the step.
                        Immutable after initialization.
                      type: string
                  required:
                  - name
                  - state
                  type: object
                type: array
                x-kubernetes-list-type: atomic
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
