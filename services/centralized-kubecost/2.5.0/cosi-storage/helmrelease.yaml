apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubecost-cosi-storage
  namespace: ${releaseNamespace}
spec:
  chart:
    spec:
      chart: object-bucket-claim
      sourceRef:
        kind: HelmRepository
        name: mesosphere.github.io-charts-stable
        namespace: kommander-flux
      version: 0.1.11
  timeout: 20m
  interval: 15s
  install:
    crds: CreateReplace
    remediation:
      retries: 30
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 30
  releaseName: kubecost-cosi-storage
  valuesFrom:
    - kind: ConfigMap
      name: centralized-kubecost-2.5.0-d2iq-defaults
    - kind: ConfigMap
      name: centralized-kubecost-2.5.0-overrides
      optional: true
    - kind: ConfigMap
      name: centralized-kubecost-2.5.0-cluster-overrides
      optional: true
  targetNamespace: ${releaseNamespace}
