---
# TODO: delete after merging the cosi-bucket-kit chart
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: takirala
  namespace: kommander-flux
spec:
  interval: 10m
  timeout: 1m
  url: https://takirala.github.io/charts/stable
---
# TODO: https://jira.nutanix.com/browse/NCN-104793 and https://jira.nutanix.com/browse/NCN-104743
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cosi-move-to-konvoy-todo
  namespace: kommander
spec:
  chart:
    spec:
      chart: cosi
      sourceRef:
        kind: HelmRepository
        name: takirala
        # name: mesosphere.github.io-charts-stable
        namespace: kommander-flux
      version: 0.0.1-alpha.2
  interval: 15s
  install:
    crds: CreateReplace
    remediation:
      retries: 30
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 30
  releaseName: does-not-matter
  targetNamespace: container-object-storage-system
