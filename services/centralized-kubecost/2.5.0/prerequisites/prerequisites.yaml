# Copy grafana-datasource cm after it has been created in the release.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: centralized-kubecost-prerequisites
  namespace: kubecost
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: centralized-kubecost-prerequisites
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces"]
    verbs: ["get", "list", "create"]
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "get", "list", "patch" ]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: centralized-kubecost-prerequisites
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: centralized-kubecost-prerequisites
subjects:
  - kind: ServiceAccount
    name: centralized-kubecost-prerequisites
    namespace: kubecost
---
apiVersion: batch/v1
kind: Job
metadata:
  name: centralized-kubecost-prerequisites
  namespace: kubecost
spec:
  template:
    metadata:
      name: centralized-kubecost-prerequisites
    spec:
      serviceAccountName: centralized-kubecost-prerequisites
      restartPolicy: OnFailure
      priorityClassName: dkp-high-priority
      containers:
        - name: create-kubecost-cluster-info-configmap
          image: "${kubetoolsImageRepository:=bitnami/kubectl}:${kubetoolsImageTag:=1.30.5}"
          command:
            - sh
            - -c
            - |
              /bin/bash <<'EOF'
              set -o nounset
              set -o errexit
              set -o pipefail
              # Skip if the configmap already exists.
              if kubectl get configmap -n kubecost kubecost-cluster-info-configmap; then
                  echo "Configmap kubecost-cluster-info-configmap already exists. Skipping the step."
                  exit 0
              fi
              kubectl create configmap kubecost-cluster-info-configmap -n kubecost -oyaml --dry-run --save-config --from-literal=CLUSTER_ID=$(kubectl get namespace kube-system -o jsonpath="{.metadata.uid}") | kubectl apply -f -
              echo "Done replacing \$CLUSTER_ID with $CLUSTERID"
              EOF
        - name: transform-cosi-secret-to-kubecost-secret
          image: "${kubetoolsImageRepository:=bitnami/kubectl}:${kubetoolsImageTag:=1.30.5}"
          command:
            - sh
            - -c
            - |
              set -o nounset
              set -o errexit
              set +x

              # Wait until federated-store secret is found.
              while ! kubectl get secret -n kubecost federated-store; do
                  echo "federated-store secret not found. Waiting for it to be created."
                  sleep 5
              done

              echo "federated-store secret found. Fetching bucketInfo..."
              bucketInfo=$(kubectl get secret -n kubecost federated-store -o go-template='{{ .data.BucketInfo | base64decode }}')
              tmpfile=$(mktemp /tmp/federated-store.XXXXXX)

              echo "Fetched bucketInfo from federated-store secret. Processing it..."
              echo "$bucketInfo" | yq eval '
              {
                "type": "S3",
                "config": {
                  "bucket": .spec.bucketName,
                  "endpoint": .spec.secretS3.endpoint | sub(":\\d+$", "") | sub("^http://", "") | sub("^https://", ""), # Remove port and protocol (if any).
                  "region": .spec.secretS3.region,
                  "access_key": .spec.secretS3.accessKeyID,
                  "secret_key": .spec.secretS3.accessSecretKey,
                  "insecure": .spec.secretS3.endpoint | test("^http://"), # Use insecure if endpoint is http (e.g.: cluster internal endpoint).
                  "signature_version2": false, # Use signature version 4.
                  "put_user_metadata": {
                    "X-Amz-Acl": "bucket-owner-full-control"
                  },
                  "http_config": {
                    "idle_conn_timeout": "90s",
                    "response_header_timeout": "2m",
                    "insecure_skip_verify": false
                  },
                  "trace": {
                    "enable": false # Enable to debug errors (if any)
                  },
                  "part_size": 10240 # TODO(takirala): Deduce this value logically.
                }
              }' > "$tmpfile"
              echo "Transformed bucketInfo to federated-store.yaml. Updating federated-store secret..."
              kubectl create secret generic federated-store -n kubecost --from-file=federated-store.yaml="$tmpfile" --dry-run=client -o yaml | kubectl apply -f -
              kubectl label secret federated-store -n kubecost app.kubernetes.io/processed-by-kommander-centralized-kubecost=true --overwrite
              rm "$tmpfile"
              # TODO(takirala): Test and support azure, nutanix cosi secrets.
