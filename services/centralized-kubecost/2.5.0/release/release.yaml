apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: centralized-kubecost
  namespace: ${releaseNamespace}
spec:
  chart:
    spec:
      chart: cost-analyzer
      sourceRef:
        kind: HelmRepository
        name: kubecost
        namespace: kommander-flux
      version: 2.5.0
  interval: 15s
  install:
    crds: CreateReplace
    remediation:
      retries: 30
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 30
  driftDetection:
    mode: enabled
  releaseName: centralized-kubecost
  valuesFrom:
    - kind: ConfigMap
      name: centralized-kubecost-2.5.0-d2iq-defaults
    - kind: ConfigMap
      name: centralized-kubecost-2.5.0-d2iq-defaults
      valuesKey: ${kubecostClusterMode:=single-cluster}-values.yaml
  targetNamespace: kubecost
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubecost-thanos-configmap-edit
  namespace: kubecost
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubecost-thanos-configmap-edit
  namespace: kubecost
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubecost-thanos-configmap-edit
  namespace: kubecost
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubecost-thanos-configmap-edit
subjects:
  - kind: ServiceAccount
    name: kubecost-thanos-configmap-edit
    namespace: kubecost
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dkp-centralized-kubecost-view
rules:
  - nonResourceURLs:
      - /dkp/kommander/kubecost
      - /dkp/kommander/kubecost/*
    verbs:
      - get
      - head
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dkp-centralized-kubecost-edit
rules:
  - nonResourceURLs:
      - /dkp/kommander/kubecost
      - /dkp/kommander/kubecost/*
    verbs:
      - get
      - head
      - post
      - put
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dkp-centralized-kubecost-admin
rules:
  - nonResourceURLs:
      - /dkp/kommander/kubecost
      - /dkp/kommander/kubecost/*
    verbs:
      - get
      - head
      - post
      - put
      - delete
