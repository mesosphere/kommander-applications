apiVersion: v1
kind: ConfigMap
metadata:
  name: kubecost-2.4.3-d2iq-defaults
  namespace: ${releaseNamespace}
data:
  values.yaml: |
    ---
    global:
      prometheus:
        # If false, Prometheus will not be installed -- only actively supported on paid Kubecost plans
        enabled: true

      grafana:
        # If false, Grafana will not be installed
        enabled: true

      savedReports:
        enabled: false # TODO - add some NKP specific reports ?

      notifications:
        alertmanager:
          # If true, allow kubecost to write to alertmanager
          enabled: true

    upgrade:
      toV2: false # TODO: Handle upgrades.

    forecasting:
      # Enable this to use kubecost's cost forecosting model
      # TODO(takirala): do we enable this and create yet another pod or disable this but ship the image for airgap bundle?
      enabled: false
      # Define persistence volume for cost-analyzer, more information at https://github.com/kubecost/docs/blob/master/storage.md
      persistentVolume:
        # Upgrades from original default 0.2Gi may break if automatic disk resize is not supported
        # https://github.com/kubecost/cost-analyzer-helm-chart/issues/507
        size: 32Gi
        # Note that setting this to false means configurations will be wiped out on pod restart.
        enabled: true
        # storageClass: "-"

    kubecostFrontend:
      enabled: true
      # TODO(takirala): publish new image and consume it
      # fullImageName: ghcr.io/mesosphere/dkp-container-images/gcr.io/kubecost1/frontend:prod-1.106.7-d2iq.1
      deployMethod: singlepod # Other possible value is `haMode` that is supported only with enterprise license.
    priority:
      enabled: true
      name: dkp-high-priority

    ingress:
      enabled: true
      annotations:
        kubernetes.io/ingress.class: kommander-traefik
        ingress.kubernetes.io/auth-response-headers: X-Forwarded-User
        traefik.ingress.kubernetes.io/router.tls: "true"
        traefik.ingress.kubernetes.io/router.middlewares: "${workspaceNamespace}-stripprefixes@kubernetescrd,${workspaceNamespace}-forwardauth@kubernetescrd"
      paths:
        - "/dkp/kubecost/frontend/"
      hosts:
        - ""
      tls: []

    prometheus:
      extraScrapeConfigs: |
        - job_name: kubecost
          honor_labels: true
          scrape_interval: 1m
          scrape_timeout: 10s
          metrics_path: /metrics
          scheme: http
          dns_sd_configs:
          - names:
            - {{ .Release.Name }}-cost-analyzer
            type: 'A'
            port: 9003
        - job_name: kubecost-networking
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
          # Scrape only the the targets matching the following metadata
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: {{ .Release.Name }}-network-costs

      server:
        image:
          repository: quay.io/prometheus/prometheus
          tag: v2.55.0
        # If clusterIDConfigmap is defined, instead use user-generated configmap with key CLUSTER_ID
        # to use as unique cluster ID in kubecost cost-analyzer deployment.
        # This overrides the cluster_id set in prometheus.server.global.external_labels.
        # NOTE: This does not affect the external_labels set in prometheus config.
        clusterIDConfigmap: kubecost-cluster-info-configmap
        extraFlags:
          - web.enable-admin-api
          - web.enable-lifecycle
          - storage.tsdb.wal-compression
        resources:
          limits:
            cpu: 1000m
            memory: 2500Mi
          requests:
            cpu: 300m
            memory: 1500Mi
        global:
          scrape_interval: 1m
          scrape_timeout: 10s
          evaluation_interval: 1m
          external_labels:
            cluster_id: $CLUSTER_ID
        persistentVolume:
          size: 32Gi
          enabled: true
        extraArgs:
          log.level: info
          log.format: json
          storage.tsdb.min-block-duration: 2h
          storage.tsdb.max-block-duration: 2h
          query.max-concurrency: 1
          query.max-samples: 100000000
        enableAdminApi: true
        service:
          gRPC:
            enabled: true
        priorityClassName: dkp-high-priority
      configmapReload:
        prometheus:
          enabled: true
          #image:
            #repository: ghcr.io/jimmidyson/configmap-reload
            #tag: v0.14.0
        alertmanager:
          enabled: true
          #image:
            #repository: ghcr.io/jimmidyson/configmap-reload
            #tag: v0.14.0
      alertmanager:
        enabled: true
        image:
          repository: quay.io/prometheus/alertmanager
          tag: v0.27.0
        resources:
          limits:
            cpu: 50m
            memory: 100Mi
          requests:
            cpu: 10m
            memory: 50Mi
        persistentVolume:
          enabled: true
      pushgateway:
        enabled: false
        persistentVolume:
          enabled: false
      serverFiles:
        alerts:
          groups:
            - name: Kubecost
              rules:
                - alert: kubecostDown
                  expr: up{job="kubecost"} == 0
                  annotations:
                    message: 'Kubecost metrics endpoint is not being scraped successfully.'
                  for: 10m
                  labels:
                    severity: warning
                - alert: kubecostMetricsUnavailable
                  expr: sum(sum_over_time(node_cpu_hourly_cost[5m])) == 0
                  annotations:
                    message: 'Kubecost metrics are not available in Prometheus.'
                  for: 10m
                  labels:
                    severity: warning
                - alert: kubecostRecordingRulesNotEvaluated
                  expr: avg_over_time(kubecost_cluster_memory_working_set_bytes[5m]) == 0
                  annotations:
                    message: 'Kubecost recording rules are not being successfully evaluated.'
                  for: 10m
                  labels:
                    severity: warning
    grafana:
      priorityClassName: dkp-high-priority
      sidecar:
        image:
          repository: docker.io/kiwigrid/k8s-sidecar
          tag: 1.28.0
        dashboards:
          enabled: true
          label: kubecost_grafana_dashboard
        datasources:
          enabled: true
          defaultDatasourceEnabled: false
          label: kubecost_grafana_datasource
      image:
        repository: ghcr.io/mesosphere/dkp-container-images/docker.io/grafana/grafana
        tag: 10.3.3-d2iq.0
      grafana.ini:
        log:
          level: warn
        server:
          protocol: http
          enable_gzip: true
          root_url: "%(protocol)s://%(domain)s:%(http_port)s/grafana"
          serve_from_sub_path: false # Set to false on Grafana v10+
        auth.proxy:
          enabled: true
          header_name: X-Forwarded-User
          auto-sign-up: true
        auth.basic:
          enabled: false
        users:
          auto_assign_org_role: Admin
        analytics:
          reporting_enabled: false
          check_for_updates: false

    kubecostProductConfigs:
      # used for display in Kubecost UI
      clusterName: "Kommander Managed Cluster"
