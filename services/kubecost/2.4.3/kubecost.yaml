apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: kubecost
  namespace: ${releaseNamespace}
spec:
  chart:
    spec:
      chart: cost-analyzer
      sourceRef:
        kind: HelmRepository
        name: kubecost
        namespace: ${releaseNamespace}
      version: 2.4.3
  interval: 15s
  install:
    crds: CreateReplace
    remediation:
      retries: 30
    createNamespace: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 30
  releaseName: kubecost
  valuesFrom:
    - kind: ConfigMap
      name: kubecost-2.4.3-defaults
    - kind: ConfigMap
      name: kubecost-2.4.3-d2iq-defaults
  targetNamespace: ${releaseNamespace}
