apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubecost-cluster-info-configmap
  namespace: ${releaseNamespace}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubecost-cluster-info-configmap
  namespace: ${releaseNamespace}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubecost-cluster-info-configmap
  namespace: ${releaseNamespace}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubecost-cluster-info-configmap
subjects:
  - kind: ServiceAccount
    name: kubecost-cluster-info-configmap
    namespace: ${releaseNamespace}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-kubecost-cluster-info-configmap
  namespace: ${releaseNamespace}
spec:
  template:
    metadata:
      name: create-kubecost-cluster-info-configmap
    spec:
      serviceAccountName: kubecost-cluster-info-configmap
      restartPolicy: OnFailure
      priorityClassName: dkp-high-priority
      containers:
        - name: kubectl
          image: "${kubetoolsImageRepository:=bitnami/kubectl}:${kubetoolsImageTag:=1.30.5}"
          command:
            - sh
            - -c
            - |
              kubectl create configmap kubecost-cluster-info-configmap -n ${releaseNamespace} -oyaml --dry-run --save-config --from-literal=CLUSTER_ID=$(kubectl get namespace kube-system -o jsonpath="{.metadata.uid}") | kubectl apply -f -
